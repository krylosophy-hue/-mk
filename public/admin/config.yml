backend:
  name: github
  repo: krylosophy-hue/-mk
  branch: main
  # Cloudflare Worker auth-прокси (sveltia-cms-auth)
  base_url: https://sveltia-cms-auth.krylosophy.workers.dev

# Логотип для UI админки
logo_url: /-mk/images/logo.png

# Базовый путь для медиа (загрузка из админки)
media_folder: "public/uploads"
public_folder: "/-mk/uploads"

# Локализация UI (с осени 2024 Sveltia поддерживает русский интерфейс)
locale: ru

# Адрес сайта для предпросмотра
site_url: https://krylosophy-hue.github.io/-mk
display_url: https://krylosophy-hue.github.io/-mk

# Коллекции — то, что редакторы могут менять
collections:
  # ============================================================
  # 1. НОВОСТИ
  # ============================================================
  - name: "news"
    label: "Новости"
    label_singular: "Новость"
    description: "Новости пресс-центра. «+ Новость» — добавить, выберите статью и нажмите 🗑 — удалить."
    folder: "content/news"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ['date', 'title']
    view_filters:
      - label: "Производство"
        field: category
        pattern: "Производство"
      - label: "Пресс-центр"
        field: category
        pattern: "Пресс-центр"
      - label: "Мероприятия"
        field: category
        pattern: "Мероприятия"
    fields:
      - { name: "title", label: "Заголовок", widget: "string", required: true }
      - { name: "date", label: "Дата", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: true }
      - { name: "category", label: "Категория", widget: "select", options: ["Производство", "Пресс-центр", "Мероприятия", "Охрана труда", "Социальная ответственность"], default: "Производство", required: true }
      - { name: "image", label: "Изображение (URL или загрузка)", widget: "image", required: false }
      - { name: "excerpt", label: "Краткое описание (1–2 предложения)", widget: "text", required: true }
      - { name: "body", label: "Полный текст", widget: "markdown", required: false }

  # ============================================================
  # 2. ОБЪЯВЛЕНИЯ НА ГЛАВНОЙ
  # ============================================================
  - name: "announcements"
    label: "Объявления (главная страница)"
    label_singular: "Объявление"
    folder: "content/announcements"
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    summary: "{{title}}"
    sortable_fields: ['order']
    fields:
      - { name: "title", label: "Заголовок", widget: "string", required: true }
      - { name: "content", label: "Текст", widget: "text", required: true }
      - { name: "link", label: "Ссылка (Подробнее)", widget: "string", required: true, hint: "Например: /consumers#tariffs или /consumer-news" }
      - { name: "order", label: "Порядок", widget: "number", default: 1, value_type: "int", min: 1, max: 99, required: true }
      - { name: "active", label: "Показывать на сайте", widget: "boolean", default: true }

  # ============================================================
  # 3. ВАКАНСИИ
  # ============================================================
  - name: "vacancies"
    label: "Вакансии"
    description: "Список открытых вакансий + условия работы. Кнопкой «+ Вакансия» добавляйте, иконкой 🗑 удаляйте, перетаскивайте ⠿ для смены порядка."
    files:
      - file: "content/vacancies.yml"
        name: "vacancies"
        label: "Список вакансий и условия работы"
        fields:
          - name: "conditions"
            label: "Условия и социальные гарантии"
            label_singular: "Пункт"
            widget: "list"
            allow_add: true
            collapsed: false
            hint: "Каждый пункт — отдельная строка в блоке «Условия и социальные гарантии» на странице вакансий."
            field: { name: "condition", label: "Текст пункта", widget: "string" }

          - name: "vacancies"
            label: "Должности"
            label_singular: "Вакансия"
            widget: "list"
            allow_add: true
            collapsed: false
            summary: "{{fields.title}} — {{fields.salary}} ({{fields.department}})"
            hint: "Перетащите ⠿ для сортировки. Вакансии группируются по «Подразделению» — указывайте одинаковое название и адрес для одного РЭК."
            fields:
              - { name: "title", label: "Должность", widget: "string", required: true, hint: "Например: Электромонтер по ремонту и обслуживанию электрооборудования 5 разряда" }
              - { name: "department", label: "Подразделение", widget: "string", required: true, hint: "Например: Район по эксплуатации коммуникационных коллекторов № 1" }
              - { name: "salary", label: "Должностной оклад", widget: "string", required: false, hint: "Например: от 77 016" }
              - { name: "address", label: "Адрес места работы", widget: "string", required: false, hint: "Например: г. Москва, ул. Лобачика, д. 4 — указывайте одинаковый для всех вакансий одного подразделения" }

  # ============================================================
  # 4. ГАЗЕТА «ПОДЗЕМНЫЙ ЛАБИРИНТ»
  # ============================================================
  - name: "newspaper"
    label: "Газета «Подземный лабиринт»"
    label_singular: "Выпуск"
    folder: "content/newspaper"
    create: true
    delete: true
    slug: "{{year}}-{{number}}"
    summary: "{{label}}"
    sortable_fields: ['year']
    fields:
      - { name: "number", label: "Номер выпуска (например: №04 (65))", widget: "string", required: true }
      - { name: "year", label: "Год", widget: "string", required: true }
      - { name: "label", label: "Подпись (например: 2025 — Выпуск №04 (65))", widget: "string", required: true }
      - { name: "file", label: "Файл PDF", widget: "file", required: true, hint: "Загрузите PDF-файл выпуска. Будет помещён в /docs/newspaper/." }

  # ============================================================
  # 5. ВИДЕО
  # ============================================================
  - name: "videos"
    label: "Видео (Пресс-центр)"
    label_singular: "Видео"
    folder: "content/videos"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Заголовок", widget: "string", required: true }
      - { name: "description", label: "Описание", widget: "text", required: true }
      - { name: "src", label: "Файл видео", widget: "file", required: true, hint: "Загрузите MP4-файл (до 100MB) или укажите путь /videos/имя.mp4" }

  # ============================================================
  # 6. НОВОСТИ ДЛЯ ПОТРЕБИТЕЛЕЙ
  # ============================================================
  - name: "consumer-news"
    label: "Новости для потребителей"
    label_singular: "Новость"
    folder: "content/consumer-news"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ['date', 'title']
    fields:
      - { name: "title", label: "Заголовок", widget: "string", required: true }
      - { name: "date", label: "Дата", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: true }
      - { name: "category", label: "Категория", widget: "select", options: ["Охрана труда", "Техническая информация", "Допуск в коллектор", "Тарифы и цены", "Прочее"], default: "Прочее", required: true }
      - { name: "excerpt", label: "Текст", widget: "text", required: true }
      - { name: "body", label: "Полный текст (опционально)", widget: "markdown", required: false }

  # ============================================================
  # 7. КОНТАКТЫ (телефоны, адреса, реквизиты, РЭК, спец.службы)
  # ============================================================
  - name: "contacts"
    label: "Контакты"
    files:
      - file: "content/contacts.yml"
        name: "contacts"
        label: "Контакты сайта"
        fields:
          - { name: "mainAddress", label: "Юридический адрес / Главный офис", widget: "string" }
          - name: "receptionHours"
            label: "Дни и часы приёма"
            widget: "list"
            field: { name: "line", label: "Строка расписания", widget: "string" }
          - { name: "mainPhone", label: "Единый номер", widget: "string" }
          - { name: "chancelleryEmail", label: "E-mail канцелярии", widget: "string" }
          - name: "tsop"
            label: "Центр обслуживания потребителей (ЦОП)"
            widget: "object"
            fields:
              - { name: "address", label: "Адрес", widget: "string" }
              - { name: "phone", label: "Телефон", widget: "string" }
              - { name: "email", label: "E-mail", widget: "string" }
          - name: "passOffice"
            label: "Бюро пропусков"
            widget: "object"
            fields:
              - { name: "address", label: "Адрес", widget: "string" }
              - { name: "phone", label: "Телефон", widget: "string" }
          - name: "socialLinks"
            label: "Социальные сети"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "Название", widget: "string" }
              - { name: "url", label: "Ссылка", widget: "string" }
          - name: "requisites"
            label: "Реквизиты"
            widget: "object"
            fields:
              - { name: "inn", label: "ИНН", widget: "string" }
              - { name: "kpp", label: "КПП", widget: "string" }
              - { name: "okpo", label: "ОКПО", widget: "string" }
              - { name: "ogrn", label: "ОГРН", widget: "string" }
              - { name: "legalAddress", label: "Юридический адрес", widget: "string" }
          - name: "productionUnits"
            label: "Производственные подразделения (РЭК-1...6, СУЭКК)"
            widget: "list"
            label_singular: "Подразделение"
            summary: "{{fields.name}} — {{fields.head}}"
            fields:
              - { name: "name", label: "Название", widget: "string" }
              - { name: "address", label: "Адрес", widget: "string" }
              - { name: "phones", label: "Телефоны", widget: "list", field: { name: "phone", label: "Телефон", widget: "string" }, required: false }
              - { name: "head", label: "Руководитель", widget: "string", required: false }
              - { name: "ext", label: "Доб. номер", widget: "string", required: false }
          - name: "specializedServices"
            label: "Специализированные службы (ОДС, ЦОП, УЭиТР…)"
            widget: "list"
            label_singular: "Служба"
            summary: "{{fields.name}} — {{fields.head}}"
            fields:
              - { name: "name", label: "Название", widget: "string" }
              - { name: "address", label: "Адрес", widget: "string" }
              - { name: "phone", label: "Телефон", widget: "string", required: false }
              - { name: "head", label: "Руководитель", widget: "string", required: false }
              - { name: "headTitle", label: "Должность руководителя", widget: "string", required: false }
              - { name: "ext", label: "Доб. номер", widget: "string", required: false }
              - { name: "headExt", label: "Доб. руководителя", widget: "string", required: false }

  # ============================================================
  # 8. ДОКУМЕНТЫ: антикоррупция
  # ============================================================
  - name: "doc-anticorruption"
    label: "Документы: Противодействие коррупции"
    label_singular: "Документ"
    folder: "content/documents/anticorruption"
    create: true
    delete: true
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Название", widget: "string", required: true }
      - { name: "file", label: "PDF-файл", widget: "file", required: true, hint: "Например: /docs/anticorruption/файл.pdf" }
      - { name: "section", label: "Раздел", widget: "select", options: ["regulatory", "local"], default: "local", hint: "regulatory = нормативные акты, local = локальные акты" }
      - { name: "order", label: "Порядок", widget: "number", default: 1, value_type: "int", min: 1, max: 99 }

  # ============================================================
  # 9. ДОКУМЕНТЫ: антитеррор
  # ============================================================
  - name: "doc-antiterror"
    label: "Документы: Противодействие терроризму"
    label_singular: "Документ"
    folder: "content/documents/antiterror"
    create: true
    delete: true
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Название", widget: "string", required: true }
      - { name: "file", label: "PDF-файл", widget: "file", required: true }
      - { name: "section", label: "Раздел", widget: "select", options: ["regulatory", "protection"], default: "regulatory", hint: "regulatory = нормативные документы, protection = антитеррористическая защищенность" }
      - { name: "order", label: "Порядок", widget: "number", default: 1, value_type: "int", min: 1, max: 99 }

  # ============================================================
  # 10. ДОКУМЕНТЫ: техническая информация
  # ============================================================
  - name: "doc-tech"
    label: "Документы: Техническая информация"
    label_singular: "Документ"
    folder: "content/documents/tech"
    create: true
    delete: true
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Название", widget: "string", required: true }
      - { name: "file", label: "Файл", widget: "file", required: true }
      - { name: "section", label: "Раздел", widget: "select", options: ["tu", "collectors", "jubilee", "transfer"], default: "tu", hint: "tu = ТУ, collectors = коллекторы, jubilee = юбилейная книга, transfer = передача" }
      - { name: "order", label: "Порядок", widget: "number", default: 1, value_type: "int", min: 1, max: 99 }

  # ============================================================
  # 11. ДОКУМЕНТЫ: акционеры (устав, ЕГРЮЛ и т.п.)
  # ============================================================
  - name: "doc-shareholders"
    label: "Документы для акционеров"
    label_singular: "Документ"
    folder: "content/documents/shareholders"
    create: true
    delete: true
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Название", widget: "string", required: true }
      - { name: "file", label: "PDF-файл", widget: "file", required: true }
      - { name: "date", label: "Дата (DD.MM.YYYY)", widget: "string", required: false }
      - { name: "size", label: "Размер (например: 2.4 MB)", widget: "string", required: false }
      - { name: "order", label: "Порядок", widget: "number", default: 1, value_type: "int", min: 1, max: 99 }

  # ============================================================
  # 12. СОБРАНИЯ АКЦИОНЕРОВ
  # ============================================================
  - name: "shareholder-meetings"
    label: "Собрания акционеров"
    files:
      - file: "content/shareholders-meetings.yml"
        name: "meetings"
        label: "Список собраний"
        fields:
          - name: "meetings"
            label: "Собрания"
            label_singular: "Собрание"
            widget: "list"
            summary: "{{fields.date}} — {{fields.type}}"
            fields:
              - { name: "date", label: "Дата", widget: "string" }
              - { name: "type", label: "Тип собрания", widget: "string" }
              - { name: "status", label: "Статус", widget: "select", options: ["Проведено", "Запланировано", "Отменено"], default: "Проведено" }

  # ============================================================
  # 13. ДОКУМЕНТЫ: закупки
  # ============================================================
  - name: "doc-procurement"
    label: "Документы по закупкам"
    label_singular: "Документ"
    folder: "content/documents/procurement"
    create: true
    delete: true
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Название", widget: "string", required: true }
      - { name: "file", label: "Файл", widget: "file", required: true }
      - { name: "order", label: "Порядок", widget: "number", default: 1, value_type: "int", min: 1, max: 99 }
